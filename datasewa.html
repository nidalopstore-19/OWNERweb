<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Panel PRO — Multi-License</title>
    <style>
        /* Warna default Abu-abu saat pertama kali load */
        :root { --p-color: #555; --card-bg: rgba(22, 26, 30, 0.95); --input-bg: #0b0d0f; --text-muted: #8e959e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        
        body { background-color: #0b0d0f; color: #fff; height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden; }

        /* --- PRELOADER (ORBIT ANIMATION) --- */
        #preloader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000000; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .orbit-container { position: relative; width: 85px; height: 85px; }
        .orbit-ring { position: absolute; inset: 0; border: 2px solid rgba(255, 255, 255, 0.05); border-radius: 50%; }
        .orbit-spinner { position: absolute; inset: 0; border-radius: 50%; animation: orbit-spin 1.2s linear infinite; }
        .orbit-ball { position: absolute; top: -8px; left: 50%; width: 16px; height: 16px; background: var(--p-color); border-radius: 50%; transform: translateX(-50%); box-shadow: 0 0 15px var(--p-color), 0 0 30px var(--p-color); transition: background 0.5s, box-shadow 0.5s; }
        @keyframes orbit-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loader-text { margin-top: 35px; color: var(--p-color); font-size: 11px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; text-align: center; transition: color 0.5s; }

        /* --- MENU NAVIGASI --- */
        .menu-btn { position: fixed; top: 20px; right: 20px; z-index: 1000; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); width: 45px; height: 45px; border-radius: 12px; color: var(--p-color); cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .nav-menu { position: fixed; top: 80px; right: -280px; width: 230px; background: var(--card-bg); z-index: 1001; padding: 15px; border-radius: 20px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); opacity: 0; visibility: hidden; }
        .nav-menu.active { right: 20px; opacity: 1; visibility: visible; }
        .nav-menu a { display: flex; align-items: center; gap: 10px; color: #fff; text-decoration: none; padding: 12px; font-size: 12px; font-weight: 700; border-radius: 12px; transition: 0.2s; margin-bottom: 3px; }
        .nav-menu a:hover { background: rgba(255,255,255,0.05); color: var(--p-color); }
        .nav-divider { border: 0; border-top: 1px solid rgba(255,255,255,0.05); margin: 8px 0; }

        /* --- LUXURY CONFIRM MODAL --- */
        #luxuryConfirm { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000000; align-items: center; justify-content: center; transition: 0.3s; }
        .confirm-card { background: #161a1e; border: 1px solid rgba(255,255,255,0.1); width: 85%; max-width: 320px; border-radius: 30px; padding: 30px; text-align: center; transform: scale(0.9); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #luxuryConfirm.show { display: flex; }
        #luxuryConfirm.show .confirm-card { transform: scale(1); }
        .confirm-icon { font-size: 40px; margin-bottom: 15px; display: block; }
        .confirm-card h3 { font-size: 18px; font-weight: 900; margin-bottom: 10px; color: #fff; }
        .confirm-card p { font-size: 12px; color: var(--text-muted); margin-bottom: 25px; line-height: 1.5; }
        .confirm-btns { display: flex; gap: 12px; }
        .btn-c { flex: 1; padding: 14px; border-radius: 15px; border: none; font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-no { background: rgba(255,255,255,0.05); color: #fff; }
        .btn-yes { background: var(--p-color); color: #fff; box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2); }

        /* --- CONTAINER UTAMA --- */
        .wrapper { width: 100%; max-width: 500px; display: flex; flex-direction: column; height: 100vh; padding: 20px; opacity: 0; transition: 0.5s; }
        .top-section { flex-shrink: 0; margin-bottom: 15px; }

        /* --- DYNAMIC FORM PANEL --- */
        .expand-card { background: var(--card-bg); border-radius: 25px; border: 1px solid rgba(255,255,255,0.03); overflow: hidden; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); max-height: 60px; cursor: pointer; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .expand-card.open { max-height: 500px; cursor: default; }
        .expand-header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; }
        .expand-header h2 { font-size: 13px; font-weight: 900; letter-spacing: 2px; color: var(--p-color); }
        .expand-icon { font-size: 18px; transition: 0.3s; }
        .expand-card.open .expand-icon { transform: rotate(45deg); color: var(--text-muted); }
        .expand-content { padding: 0 25px 25px 25px; opacity: 0; transition: 0.3s; pointer-events: none; }
        .expand-card.open .expand-content { opacity: 1; pointer-events: all; }

        .scroll-section { flex-grow: 1; overflow-y: auto; padding-bottom: 50px; scrollbar-width: none; -ms-overflow-style: none; }
        .scroll-section::-webkit-scrollbar { display: none; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 8px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; letter-spacing: 1px; }
        input { width: 100%; background: var(--input-bg); border: 2px solid #1e2227; padding: 12px; color: #fff; border-radius: 14px; outline: none; font-size: 13px; }
        input:focus { border-color: var(--p-color); }
        .btn-main { width: 100%; background: var(--p-color); color: #fff; border: none; padding: 15px; border-radius: 14px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 11px; }

        .lic-card { background: var(--card-bg); border-radius: 24px; padding: 20px; border: 1px solid rgba(255,255,255,0.03); margin-bottom: 15px; }
        .lic-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .lic-name { font-size: 14px; font-weight: 800; color: #fff; }
        .badge { font-size: 8px; padding: 4px 10px; border-radius: 8px; font-weight: 900; text-transform: uppercase; }
        .badge-active { background: rgba(0, 255, 128, 0.1); color: #00ff80; }
        .badge-expired { background: rgba(255, 49, 49, 0.1); color: #ff3131; }
        .lic-key-row { font-family: monospace; font-size: 11px; color: var(--p-color); margin-bottom: 10px; display: block; opacity: 0.8; }
        .action-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn-act { padding: 10px; border-radius: 12px; border: none; cursor: pointer; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .btn-edit { background: #242a32; color: #fff; }
        .btn-del { background: rgba(255, 49, 49, 0.05); color: #ff3131; }
        .btn-toggle { background: #fff; color: #000; }
        .btn-toggle.active-btn { background: #00ff80; color: #000; }

        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #00ff80; color: #000; padding: 14px 28px; border-radius: 14px; font-weight: 800; transition: 0.5s; z-index: 100000; font-size: 12px; }
        #toast.show { top: 30px; }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="orbit-container">
            <div class="orbit-ring"></div>
            <div class="orbit-spinner"><div class="orbit-ball"></div></div>
        </div>
        <div class="loader-text" id="loader-status">LOADING...</div>
    </div>

    <button class="menu-btn" onclick="toggleMenu()"><span id="icon-menu">☰</span></button>

    <div class="nav-menu" id="sideMenu">
        <a href="index.html">👑 Owner Panel</a>
        <a href="database.html">📊 Database Viewer</a>
        <a href="keuntungan.html">💰 Keuntungan</a>
        <a href="ceksewa.html">⏳ Cek Sewa</a>
        <a href="admin_settings.html">🎨 Customizer</a>
        <hr class="nav-divider">
        <a href="#" onclick="localStorage.clear(); location.reload();" style="color: #ff3131;">🚪 Logout</a>
    </div>

    <div id="luxuryConfirm">
        <div class="confirm-card">
            <span class="confirm-icon">⚠️</span>
            <h3>Hapus Member?</h3>
            <p>Data lisensi dan akses member ini akan dihapus secara permanen dari database.</p>
            <div class="confirm-btns">
                <button class="btn-c btn-no" onclick="closeLuxuryModal(false)">Batal</button>
                <button class="btn-c btn-yes" onclick="closeLuxuryModal(true)">Ya, Hapus</button>
            </div>
        </div>
    </div>

    <div id="toast">SYSTEM UPDATED! 🚀</div>

    <div class="wrapper" id="mainContent">
        <div class="top-section">
            <div class="expand-card" id="formPanel">
                <div class="expand-header" onclick="toggleForm()">
                    <h2 id="formTitle">NEW LICENSE</h2>
                    <span class="expand-icon" id="plusIcon">+</span>
                </div>
                <div class="expand-content">
                    <input type="hidden" id="editId">
                    <div class="form-group"><label>Member Name</label><input type="text" id="nameInput" placeholder="Nama Client"></div>
                    <div class="form-group"><label>Manual API Key</label><input type="text" id="apiInput" placeholder="KEY-XXXX"></div>
                    <div class="form-group"><label>Expiration Date</label><input type="datetime-local" id="dateInput"></div>
                    <button class="btn-main" onclick="saveData()">SAVE CONFIGURATION</button>
                    <p onclick="toggleForm()" style="text-align:center; font-size:10px; margin-top:15px; color:var(--text-muted); cursor:pointer;">CLOSE FORM</p>
                </div>
            </div>
        </div>

        <div style="font-size:10px; color:var(--text-muted); font-weight:800; margin: 0 0 10px 10px; letter-spacing:1px;">ACTIVE LICENSES</div>
        <div class="scroll-section" id="licenseList"></div>
    </div>

    <script>
        const BASE_URL = "https://ownernidalop-default-rtdb.firebaseio.com/";
        const FB_URL = `${BASE_URL}licenses`; 

        let deleteTargetId = null;

        function toggleMenu() { 
            const menu = document.getElementById('sideMenu');
            const icon = document.getElementById('icon-menu');
            menu.classList.toggle('active');
            icon.innerText = menu.classList.contains('active') ? "✕" : "☰";
        }

        function toggleForm() { document.getElementById('formPanel').classList.toggle('open'); }

        // SINKRONISASI TEMA & WARNA DARI DATABASE
        async function syncThemeAndInit() {
            const loaderStatus = document.getElementById('loader-status');
            const preloader = document.getElementById('preloader');
            const content = document.getElementById('mainContent');

            try {
                // Fetch Warna Primary dari owner_config
                const res = await fetch(`${BASE_URL}owner_config.json`);
                const config = await res.json();

                if (config && config.colors) {
                    // Update warna dari database
                    document.documentElement.style.setProperty('--p-color', config.colors.primary);
                    loaderStatus.innerText = "KHUSUS OWNER NIDALOP...";
                }
            } catch (e) { console.log("Offline Mode"); }

            // Loading Delay Mewah
            setTimeout(() => {
                preloader.style.opacity = '0';
                setTimeout(() => {
                    preloader.style.display = 'none';
                    content.style.opacity = '1';
                    fetchData();
                }, 800);
            }, 1500);
        }

        async function saveData() {
            const name = document.getElementById('nameInput').value;
            const key = document.getElementById('apiInput').value;
            const date = document.getElementById('dateInput').value;
            const editId = document.getElementById('editId').value;
            if(!name || !key || !date) return;

            const targetId = editId ? editId : key;
            await fetch(`${FB_URL}/${targetId}.json`, {
                method: 'PUT',
                body: JSON.stringify({ nama: name, api_key: key, expiry_date: date, status: "active" })
            });

            showToast("DATA SAVED!");
            resetForm();
            if(document.getElementById('formPanel').classList.contains('open')) toggleForm();
            fetchData();
        }

        async function fetchData() {
            const res = await fetch(`${FB_URL}.json?nocache=${new Date().getTime()}`);
            const data = await res.json();
            const container = document.getElementById('licenseList');
            container.innerHTML = "";
            
            if(data) {
                const sortedKeys = Object.keys(data).reverse();
                sortedKeys.forEach(id => {
                    const item = data[id];
                    const isExp = new Date() > new Date(item.expiry_date);
                    const statusClass = (item.status === 'active' && !isExp) ? "badge-active" : "badge-expired";
                    container.innerHTML += `
                        <div class="lic-card">
                            <div class="lic-header">
                                <div class="lic-name">${item.nama}</div>
                                <div class="badge ${statusClass}">${(item.status === 'active' && !isExp) ? 'ACTIVE' : 'OFF/EXP'}</div>
                            </div>
                            <code class="lic-key-row">> ${item.api_key}</code>
                            <div class="action-grid">
                                <button class="btn-act btn-edit" onclick="prepareEdit('${id}')">Edit</button>
                                <button class="btn-act btn-del" onclick="askDelete('${id}')">Delete</button>
                                <button class="btn-act btn-toggle ${item.status === 'active' ? 'active-btn' : ''}" onclick="toggleStatus('${id}', '${item.status}')">
                                    ${item.status === 'active' ? 'ON' : 'OFF'}
                                </button>
                            </div>
                        </div>`;
                });
            }
        }

        function askDelete(id) {
            deleteTargetId = id;
            document.getElementById('luxuryConfirm').classList.add('show');
        }

        function closeLuxuryModal(confirm) {
            document.getElementById('luxuryConfirm').classList.remove('show');
            if(confirm && deleteTargetId) executeDelete(deleteTargetId);
            deleteTargetId = null;
        }

        async function executeDelete(id) {
            await fetch(`${FB_URL}/${id}.json`, { method: 'DELETE' });
            showToast("MEMBER DELETED! 💀");
            fetchData();
        }

        async function toggleStatus(id, current) {
            const next = current === 'active' ? 'expired' : 'active';
            await fetch(`${FB_URL}/${id}/status.json`, { method: 'PUT', body: JSON.stringify(next) });
            fetchData();
        }

        async function prepareEdit(id) {
            const res = await fetch(`${FB_URL}/${id}.json`);
            const data = await res.json();
            document.getElementById('editId').value = id;
            document.getElementById('nameInput').value = data.nama;
            document.getElementById('apiInput').value = data.api_key;
            document.getElementById('dateInput').value = data.expiry_date;
            document.getElementById('formTitle').innerText = "EDIT MODE";
            if(!document.getElementById('formPanel').classList.contains('open')) toggleForm();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('editId').value = "";
            document.getElementById('nameInput').value = "";
            document.getElementById('apiInput').value = "";
            document.getElementById('dateInput').value = "";
            document.getElementById('formTitle').innerText = "NEW LICENSE";
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // Jalankan sinkronisasi tema dan inisialisasi
        syncThemeAndInit();
    </script>
</body>
</html>
